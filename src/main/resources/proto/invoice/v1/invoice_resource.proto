syntax = "proto3";

package se.ts.invoice.v1;

option java_multiple_files = true;
option java_package = "se.ts.invoice.v1.proto";
option java_outer_classname = "InvoiceResourceProto";

import "google/protobuf/timestamp.proto";

// Represents a line item on an invoice
message InvoiceItem {
  string id = 1;
  string description = 2;
  int32 quantity = 3;
  int64 unit_price_cents = 4;
  int64 total_cents = 5;
}

// Represents an invoice
message Invoice {
  string id = 1;
  string invoice_number = 2;
  string customer_id = 3;
  string customer_name = 4;
  google.protobuf.Timestamp issue_date = 5;
  google.protobuf.Timestamp due_date = 6;
  repeated InvoiceItem items = 7;
  int64 subtotal_cents = 8;
  int64 tax_cents = 9;
  int64 total_cents = 10;
  string currency = 11;
  InvoiceStatus status = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

// Invoice status enum
enum InvoiceStatus {
  INVOICE_STATUS_UNSPECIFIED = 0;
  INVOICE_STATUS_DRAFT = 1;
  INVOICE_STATUS_SENT = 2;
  INVOICE_STATUS_PAID = 3;
  INVOICE_STATUS_OVERDUE = 4;
  INVOICE_STATUS_CANCELLED = 5;
}

// Request to create an invoice
message CreateInvoiceRequest {
  string customer_id = 1;
  string customer_name = 2;
  google.protobuf.Timestamp issue_date = 3;
  google.protobuf.Timestamp due_date = 4;
  repeated InvoiceItem items = 5;
  string currency = 6;
}

// Response after creating an invoice
message CreateInvoiceResponse {
  Invoice invoice = 1;
}

// Request to get an invoice by ID
message GetInvoiceRequest {
  string id = 1;
}

// Response containing the requested invoice
message GetInvoiceResponse {
  Invoice invoice = 1;
}

// Request to list invoices with optional filters
message ListInvoicesRequest {
  int32 page_size = 1;
  string page_token = 2;
  string customer_id = 3;
  InvoiceStatus status = 4;
}

// Response containing a list of invoices
message ListInvoicesResponse {
  repeated Invoice invoices = 1;
  string next_page_token = 2;
  int32 total_count = 3;
}

// Request to update an invoice
message UpdateInvoiceRequest {
  string id = 1;
  string customer_name = 2;
  google.protobuf.Timestamp due_date = 3;
  repeated InvoiceItem items = 4;
  InvoiceStatus status = 5;
}

// Response after updating an invoice
message UpdateInvoiceResponse {
  Invoice invoice = 1;
}

// Request to delete an invoice
message DeleteInvoiceRequest {
  string id = 1;
}

// Response after deleting an invoice
message DeleteInvoiceResponse {
  bool success = 1;
}
